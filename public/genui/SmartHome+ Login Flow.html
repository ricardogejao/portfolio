<!doctype html>
<html lang="en" data-brand="telus" data-platform="ios">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SmartHome+ · Login flow</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

<!-- 1 + 2 · Token CSS — swap brand-XXX / platform-XXX to change theme -->
<link id="cds-token-brand" rel="stylesheet" href="src/tokens/brand-telus.css">
<link id="cds-token-platform" rel="stylesheet" href="src/tokens/platform-ios.css">
<script>window.CDS_TOKEN_REPO = null;</script>
<script src="src/tokens/loader.js"></script>
<link rel="stylesheet" href="src/styles.css">

<link rel="preload" href="https://unpkg.com/react@18.3.1/umd/react.development.js" as="script" crossorigin="anonymous">
<link rel="preload" href="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" as="script" crossorigin="anonymous">
<link rel="preload" href="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" as="script" crossorigin="anonymous">

<style>
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--background-app, #fff);
    min-height: 100vh;
  }
  /* prevent the page itself from feeling like a "web design" — soft surface, no scrollbars on chrome */
  body::-webkit-scrollbar { width: 12px; }
  body::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.08); border-radius: 8px; }
</style>
</head>
<body>

<div id="root"></div>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- CDS infrastructure -->
<script src="src/tokens.js"></script>
<script src="src/icon-data.js"></script>
<script src="src/icons.js"></script>
<script src="src/icon-meta.js"></script>
<script type="text/babel" src="src/icon-renderer.jsx"></script>

<!-- CDS components -->
<script type="text/babel" src="src/feedback-caption.jsx"></script>
<script type="text/babel" src="src/text-input-field.jsx"></script>
<script type="text/babel" src="src/checkbox.jsx"></script>
<script type="text/babel" src="src/banner.jsx"></script>
<script type="text/babel" src="src/button.jsx"></script>
<script type="text/babel" src="src/toggle-button.jsx"></script>
<script type="text/babel" src="src/device-tile.jsx"></script>
<script type="text/babel" src="src/pill.jsx"></script>
<script type="text/babel" src="src/tag.jsx"></script>
<script type="text/babel" src="src/snackbar.jsx"></script>
<script type="text/babel" src="src/ai-assistant.jsx"></script>
<script type="text/babel" src="src/app-nav.jsx"></script>

<!-- iOS frame (we only use IOSStatusBar; full frame is included for the dynamic island / home indicator helpers if needed) -->
<script type="text/babel" src="frames/ios-frame.jsx"></script>

<!-- Tweaks shell -->
<script type="text/babel" src="tweaks-panel.jsx"></script>

<!-- App -->
<script type="text/babel" src="src/home-screen.jsx"></script>
<script type="text/babel" src="src/login-screens.jsx"></script>
<script type="text/babel" src="src/login-app.jsx"></script>

</body>
</html>
